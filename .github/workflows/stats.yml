name: Update README cards

on:
  workflow_dispatch:

  schedule:
    - cron: "0 9 * * 6"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Stats
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=mikitosina1&show_icons=true&theme=cobalt
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Top Languages
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=mikitosina1&layout=compact&theme=cobalt
          path: profile/top-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/*.svg

          git diff --cached --quiet || git commit -m "Update README cards"

          git pull --rebase origin main
          git push
